; https://github.com/uiriansan/SilentSDDM/wiki/Customizing

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = fill

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = sea.jpg
use-background-color = false
background-color = #363636
blur = 64
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = top-center
align = center
format = hh:mm
font-family = RedHatDisplay
font-size = 124
font-weight = 900
color = #fcfcfc

[LockScreen.Date]
display = true
format = ddd, d MMM
locale = "ru_RU"
font-family = RedHatDisplay
font-size = 28
font-weight = 600
color = #fcfcfc
margin-top = -22

[LockScreen.Message]
display = true
position = bottom-center
align = center
text = Нажмите любую кнопку
font-family = RedHatDisplay
font-size = 18
font-weight = 400
display-icon = true
icon = enter.svg
icon-size = 22
color = #363636
paint-icon = true
spacing = 0

[LoginScreen]
background = sea.jpg
use-background-color = false
background-color = #363636
blur = 12
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = center
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = circle
border-radius = 35
active-size = 180
inactive-size = 90
inactive-opacity = 0.35
active-border-size = 0
inactive-border-size = 0
active-border-color = #315bef
inactive-border-color = #656565

[LoginScreen.LoginArea.Username]
font-family = RedHatDisplay
font-size = 18
font-weight = 600
color = #363636
margin = 14

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 30
display-icon = true
font-family = RedHatDisplay
font-size = 12
icon = password.svg
icon-size = 16
content-color = #fcfcfc
background-color = #656565
background-opacity = 0.60
border-size = 0
border-color = #363636
border-radius-left = 10
border-radius-right = 10
margin-top = 10

[LoginScreen.LoginArea.LoginButton]
background-color = #656565
background-opacity = 0.60
active-background-color = #315bef
active-background-opacity = 0.75
icon = arrow-right.svg
icon-size = 18
content-color = #fcfcfc
active-content-color = #c8d9e3
border-size = 0
border-color = #363636
border-radius-left = 10
border-radius-right = 10
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = RedHatDisplay
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Авторизация..."
font-family = RedHatDisplay
font-weight = 600
font-size = 18
icon-size = 30
icon = spinner.svg
color = #363636
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = RedHatDisplay
font-size = 16
font-weight = 400
normal-color = #fcfcfc
warning-color = #f67400
error-color = #da4453
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 5
spacing = 10
font-family = RedHatDisplay

[LoginScreen.MenuArea.Popups]
max-height = 320
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = #363636
background-opacity = 0.60
active-option-background-color = #315bef
active-option-background-opacity = 0.75
content-color = #fcfcfc
active-content-color = #c8d9e3
font-family = RedHatDisplay
border-size = 0
border-color = #363636
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = bottom-left
index = 0
popup-direction = up
popup-align = center
display-session-name = true
button-width = 200
popup-width = 200
background-color = #656565
background-opacity = 0.60
active-background-opacity = 0.75
content-color = #fcfcfc
active-content-color = #c8d9e3
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = bottom-right
index = 0
popup-direction = up
popup-align = center
popup-width = 180
display-layout-name = true
background-color = #656565
background-opacity = 0.60
active-background-opacity = 0.75
content-color = #fcfcfc
active-content-color = #c8d9e3
border-size = 0
font-size = 10
icon = language.svg
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = bottom-right
index = 0
background-color = #656565
background-opacity = 0.60
active-background-opacity = 0.75
content-color = #fcfcfc
active-content-color = #c8d9e3
border-size = 0
icon = keyboard.svg
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = bottom-right
index = 0
popup-direction = up
popup-align = center
popup-width = 100
background-color = #656565
background-opacity = 0.60
active-background-opacity = 0.75
content-color = #fcfcfc
active-content-color = #c8d9e3
border-size = 0
icon = power.svg
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = login
start-hidden = true
background-color = #363636
background-opacity = 0.80
key-content-color = #fcfcfc
key-color = #d3d8e3
key-opacity = 0.40
key-active-background-color = #315bef
key-active-opacity = 0.60
selection-background-color = #fcfcfc
selection-content-color = #4e4e4e
primary-color = #363636
border-size = 0
border-color = #656565

[Tooltips]
enable = true
font-family = RedHatDisplay
font-size = 12
content-color = #fcfcfc
active-content-color = #c8d9e3
background-color = #656565
background-opacity = 0.75
border-radius = 5
disable-user = false
disable-login-button = false
